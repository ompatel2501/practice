<!DOCTYPE html>
<html ng-app="myApp">

<head>
    <title>practical 11</title>
</head>

<body ng-controller="myCtrl">
    <h2>Student Information Tabel</h2>
     <table border="1">
      <tr>
           <th>Roll_no</th>
           <th>name</th>
              <th>age</th>
      </tr>

      <tr ng-repeat= "student in students", ng-class="{'odd' : $odd, 'even' : $even}">
         <td>{{student.roll_no}}</td>
         <td>{{student.name}}</td>
            <td>{{student.age}}</td>
      </tr>
 <table>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script>
        var app = angular.module("myApp", []);

        app.controller("myCtrl", function ($scope) {
            $scope.students = [
                { roll_no: "1", name: "om", age: "20" },
                { roll_no: "2", name: "Saksham", age: "19" },
                { roll_no: "3", name: "Parth", age: "20" },
                { roll_no: "4", name: "Krishna", age: "18" }
            ];
        });
    </script>
    <style>
        table {
            border-collapse: collapse;
            width: 35%;
            margin-top: 20px;
        }

        th {
            background-color: blueviolet;
            color: black;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            padding: 10px;
            height: 20px;

        }

        td {
            text-align: center;
            padding: 10px;
            color: black;
            font-weight: bold;
        }

        .odd {
            background-color: rgb(193, 132, 250);
        }

        .even {
            background-color: rgb(220, 193, 246);
        }
    </style>
</body>

</html>
